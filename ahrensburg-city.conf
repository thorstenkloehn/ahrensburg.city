server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name ahrensburg.city;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ahrensburg.city;
    ssl_certificate /etc/letsencrypt/live/ahrensburg.city/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahrensburg.city/privkey.pem;
    root /home/thorsten/ahrensburg.city/public;

    location / {
        try_files $uri $uri/ =404;
    }
}
server {
    server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name strapi.ahrensburg.city;
    ssl_certificate /etc/letsencrypt/live/strapi.ahrensburg.city/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/strapi.ahrensburg.city/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
