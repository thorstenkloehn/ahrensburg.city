<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Hugo-Seite</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
    <!-- Dein HTML-Inhalt hier -->
    <label for="linkListToggle" class="cursor-pointer px-5 py-2 bg-blue-500 text-white rounded">Link-Liste öffnen</label>
    <input type="checkbox" id="linkListToggle" class="hidden">
    <ul id="linkList" class="hidden">
        <li><a href="https://ahrensburg.city" class="text-blue-500">Startseite</a></li>
        <li><a href="#" class="text-blue-500">Link 2</a></li>
        <li><a href="#" class="text-blue-500">Link 3</a></li>
    </ul>
    <script>
        document.getElementById('linkListToggle').addEventListener('change', function() {
            document.getElementById('linkList').classList.toggle('hidden', !this.checked);
        });
    </script>
</body>
</html>
