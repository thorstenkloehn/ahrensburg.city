server {
    listen 80 default_server;
    listen [::]:80 default_server;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
   listen       443 ssl;
    server_name ahrensburg.city;
     ssl_certificate     /etc/letsencrypt/live/ahrensburg.city/fullchain.pem;
     ssl_certificate_key /etc/letsencrypt/live/ahrensburg.city/privkey.pem;


    location /karte {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        gzip on;
    }
     location /geoserver {
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://127.0.0.1:8080/geoserver;
      }


location / {
       root /Server;
        index  index.html index.htm;
        gzip on;
      }


}

server {
    listen       443 ssl;
    server_name  ahrensburg.blog;
     root /Wordpress/wordpress;
            index  index.php index.html index.htm;
      ssl_certificate     /etc/letsencrypt/live/ahrensburg.blog/fullchain.pem;
         ssl_certificate_key /etc/letsencrypt/live/ahrensburg.blog/privkey.pem;
    location / {
        root   /Wordpress/wordpress;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
       fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME
         $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}

